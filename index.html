<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moroccansportshub</title>

<style>
:root{
--bg:#000;
--bg2:#091015;
--text:#fff;
--cyan:#00f2fe;
}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(var(--bg),var(--bg2));
color:var(--text);
}
header{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #333;
}
button{cursor:pointer}
#colors-modal{
display:none;
position:fixed;
inset:0;
background:#000;
align-items:center;
justify-content:center;
}
.modal-box{
background:#111;
padding:20px;
border-radius:10px;
}
.feed{
padding:20px;
}
.post{
margin-bottom:20px;
padding:10px;
border:1px solid #333;
}
</style>
</head>

<body>

<header>
<div>Moroccansportshub</div>
<button onclick="openColorStudio()">🎨</button>
</header>

<div class="feed" id="feed"></div>

<div id="colors-modal">
<div class="modal-box">
<h3>Color Studio</h3>
<button onclick="resetCustomColors()">Reset</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let posts = [
{id:1,text:"Post 1"},
{id:2,text:"Post 2"}
];

function renderFeed(){
const container=document.getElementById("feed");
container.innerHTML="";
posts.forEach(p=>{
const div=document.createElement("div");
div.className="post";
div.innerHTML=p.text+" <button onclick='react("+p.id+")'>👍</button>";
container.appendChild(div);
});
}

function react(id){
const scrollY=window.scrollY;
requestAnimationFrame(()=>{
window.scrollTo(0,scrollY);
});
}

function openColorStudio(){
document.getElementById("colors-modal").style.display="flex";
document.body.style.overflow="hidden";
}

function closeModal(){
document.getElementById("colors-modal").style.display="none";
document.body.style.overflow="";
}

function resetCustomColors(){
localStorage.removeItem("msh_custom_colors");
document.documentElement.style.cssText=`
--bg:#000;
--bg2:#091015;
--text:#fff;
--cyan:#00f2fe;
`;
}

function init(){
document.body.classList.remove("light");
renderFeed();
}

init();

</script>

</body>
</html>
