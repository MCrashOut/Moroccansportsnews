<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoroccanSportsNews | Premium Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020608;
            --grad: linear-gradient(165deg, #020608 0%, #0c1c24 100%);
            --cyan: #00f2fe;
            --red: #c1272d;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); background-image: var(--grad); color: var(--text); overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(2, 6, 8, 0.95); backdrop-filter: blur(25px);
            padding: 1.1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1.5px; }
        .logo span { color: var(--cyan); }

        .hero { 
            height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=1600') center/cover;
            border-bottom: 3px solid var(--red); margin-top: 60px;
        }
        .hero h1 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800; text-transform: uppercase; letter-spacing: -2px; }
        .hero p { color: var(--cyan); letter-spacing: 5px; font-size: 0.8rem; margin-top: 15px; }

        section { padding: 60px 5% 20px; }
        .section-header { margin-bottom: 35px; display: flex; align-items: center; gap: 15px; }
        .section-header h2 { font-size: 1.7rem; text-transform: uppercase; border-left: 5px solid var(--red); padding-left: 15px; letter-spacing: -1px; }

        .scroller { display: flex; gap: 25px; overflow-x: auto; padding: 10px 5px 40px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }

        .card { 
            min-width: 340px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 25px; overflow: hidden; transition: 0.4s; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--cyan); background: rgba(255,255,255,0.06); }
        .card-img { width: 100%; height: 210px; object-fit: cover; background: #111; }
        .card-body { padding: 25px; }
        .badge { background: var(--red); color: #fff; font-size: 0.65rem; padding: 4px 12px; border-radius: 4px; font-weight: 800; margin-bottom: 12px; display: inline-block; }
        .card-body h3 { font-size: 1.1rem; line-height: 1.4; height: 3.2rem; overflow: hidden; font-weight: 700; }

        .vid-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 30px; }
        .vid-card { background: #000; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); }
        .vid-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .vid-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(20px); }
        .modal-content { background: #020608; max-width: 800px; width: 100%; border-radius: 35px; padding: 50px; position: relative; border: 1px solid var(--border); }
        .close { position: absolute; top: 25px; right: 35px; font-size: 3rem; cursor: pointer; color: var(--cyan); }

        footer { padding: 80px 5%; text-align: center; border-top: 1px solid var(--border); opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Moroccan<span>SportsNews</span></div>
    </header>

    <div class="hero">
        <h1 id="hero-title">Elite Intel Feed</h1>
        <p id="live-ticker">MARCH 2026 | SUBJECT ENCRYPTION ACTIVE</p>
    </div>

    <section id="global">
        <div class="section-header"><h2>Global Intelligence</h2></div>
        <div class="scroller" id="global-container">
            <!-- News injected here -->
        </div>
    </section>

    <section id="lions" style="background: rgba(0,0,0,0.15);">
        <div class="section-header"><h2>Atlas Lions Updates</h2></div>
        <div class="scroller" id="lions-container">
            <!-- News injected here -->
        </div>
    </section>

    <section id="highlights">
        <div class="section-header"><h2>Video Highlights</h2></div>
        <div class="vid-grid" id="vid-container">
            <!-- Videos injected here -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 MoroccanSportsNews | Official Media Hub</p>
    </footer>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM()">&times;</span>
            <div id="m-badge" class="badge">LIVE INTEL</div>
            <h2 id="m-title" style="margin: 20px 0; font-size: 2.2rem; line-height: 1.1;"></h2>
            <p id="m-body" style="color: var(--text-dim); line-height: 1.8; font-size: 1.1rem;"></p>
        </div>
    </div>

    <script>
        // 1. ELITE BACKUP DATABASE (Used if API fails)
        const fallbackNews = {
            global: [
                { tag: "UCL", title: "Mbappé integration at Madrid: Tactical analysis for 2026", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800", desc: "Coaching staff confirms Mbappé will take the central role in tonight's quarter-final clash." },
                { tag: "F1", title: "Hamilton sets lap record in Ferrari SF-26 private test", img: "https://images.unsplash.com/photo-1533130061792-64b345e4a833?w=800", desc: "Lewis Hamilton's performance in Maranello suggests Ferrari has the fastest car for the 2026 season." },
                { tag: "NBA", title: "Wembanyama leads MVP race following 50-point game", img: "https://images.unsplash.com/photo-1504450758481-7338eba7524a?w=800", desc: "The San Antonio Spurs giant continues to redefine basketball metrics in March 2026." },
                { tag: "PREMIER", title: "Manchester City facing 1 point gap in title race", img: "https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800", desc: "The final stretch of the English season looks to be the closest in a decade." }
            ],
            lions: [
                { tag: "LIONS", title: "Brahim Diaz confirmed for Morocco's March Friendlies", img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800", desc: "The playmaker has arrived in Rabat to join the Atlas Lions training camp." },
                { tag: "AFCON", title: "Morocco 2025/26 Stadium Progress: 95% Complete", img: "https://images.unsplash.com/photo-1431324155629-1a6eda1eed15?w=800", desc: "Official inspectors confirm the Casablanca Grand Stadium is ready for international testing." },
                { tag: "BOTOLA", title: "Raja vs Wydad: Derby ticket sales hit record high", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800", desc: "The Casablanca Derby remains the most watched sporting event in North Africa." }
            ],
            vids: [
                { title: "Real Madrid vs Man City Highlights", id: "n4X0969SgGk" },
                { title: "Morocco vs Brazil: Historic Goals", id: "Xq_I-I0Xz6M" },
                { title: "F1 2026: Ferrari SF-26 Reveal", id: "T0mG44pLCHg" },
                { title: "NBA Best of Wembanyama", id: "1v0oP6y9Y-A" }
            ]
        };

        const YT_KEY = "AIzaSyDXRWNSGIBf-iBZiSma2H-cpl6UG-tWcvI";

        async function loadFeed() {
            // Attempt YouTube API
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&order=date&q=Real+Madrid+Morocco+Football+NBA+latest&type=video&key=${YT_KEY}`);
                const data = await res.json();
                
                if(data.items && data.items.length > 0) {
                    console.log("API Success");
                    renderAPI(data.items);
                } else {
                    throw new Error("Quota Empty");
                }
            } catch (e) {
                console.log("Using Fail-Proof Fallback Content");
                renderFallback();
            }
        }

        function renderFallback() {
            const gCont = document.getElementById('global-container');
            const lCont = document.getElementById('lions-container');
            const vCont = document.getElementById('vid-container');

            gCont.innerHTML = fallbackNews.global.map(n => createCard(n)).join('');
            lCont.innerHTML = fallbackNews.lions.map(n => createCard(n)).join('');
            vCont.innerHTML = fallbackNews.vids.map(v => createVid(v)).join('');
        }

        function createCard(n) {
            return `
                <div class="card" onclick="openMod('${n.title}', '${n.desc}')">
                    <img src="${n.img}" class="card-img">
                    <div class="card-body">
                        <span class="badge">${n.tag}</span>
                        <h3>${n.title}</h3>
                    </div>
                </div>
            `;
        }

        function createVid(v) {
            return `
                <div class="vid-card">
                    <div class="vid-wrap">
                        <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
                    </div>
                    <div style="padding:20px"><h4>${v.title}</h4></div>
                </div>
            `;
        }

        function openMod(t, b) {
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-body').innerText = b;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        // Start everything
        window.onload = () => {
            loadFeed();
            // Update time
            const now = new Date();
            document.getElementById('live-ticker').innerText = `LIVE FEED: ${now.toLocaleTimeString()} | ENCRYPTION SECURE`;
        };
        
        window.onclick = (e) => { if(e.target.id === 'modal') closeM(); }
    </script>
</body>
</html>
