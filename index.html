<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoroccanSportsHub | Elite Intelligence 2026</title>

    <link rel="icon" type="image/png" href="https://github.com/MCrashOut/Moroccansportsnews/blob/main/favicon.png/icon.png?raw=true">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <!-- CORE LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

    <style>
        :root {
            --bg: #000000;
            --grad: linear-gradient(180deg, #000000 0%, #080f12 100%);
            --cyan: #00f2fe;
            --blue-intel: #3b5998;
            --red: #c1272d;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); background-image: var(--grad); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px);
            padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; letter-spacing: -1px; }
        .logo img { width: 28px; height: 28px; border-radius: 4px; margin-right: 8px; border: 1px solid var(--cyan); }
        .logo span { color: var(--cyan); }
        
        nav ul { display: flex; list-style: none; gap: 15px; align-items: center; }
        nav a { color: var(--text); text-decoration: none; font-size: 0.55rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; cursor: pointer;}
        nav a:hover, nav a.active { opacity: 1; color: var(--cyan); }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .auth-btn { background: var(--cyan); color: #000; padding: 7px 18px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; transition: 0.3s; }

        .view-page { display: none; padding-top: 85px; animation: fadeIn 0.4s ease; min-height: 100vh; padding-bottom: 80px; }
        .view-page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* POST CARDS */
        .post-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; position: relative; transition: 0.3s; }
        .post-card.pinned { border: 2px solid var(--cyan); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
        .post-user { color: var(--cyan); font-weight: 800; font-size: 0.9rem; margin-bottom: 5px; display: block; }
        
        /* REACTIONS - TRANSPARENT */
        .feed-react-btn { background: transparent !important; border: none !important; outline: none !important; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #fff; filter: grayscale(1); transition: 0.2s; padding: 5px; box-shadow: none !important; }
        .feed-react-btn.active { filter: grayscale(0); color: var(--cyan); font-weight: 800; }

        .pin-btn { position: absolute; top: 22px; right: 55px; color: var(--cyan); cursor: pointer; opacity: 0.4; }
        .delete-btn { position: absolute; top: 22px; right: 20px; color: var(--red); cursor: pointer; opacity: 0.4; }

        /* HOME GRID */
        .newspaper-grid { display: grid; grid-template-columns: 280px 1fr 320px; gap: 40px; padding: 20px 5%; }
        @media (max-width: 1100px) { .newspaper-grid { grid-template-columns: 1fr; } }
        .side-wire { border-right: 1px solid var(--border); padding-right: 25px; }
        .wire-item { cursor: pointer; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .wire-item h4 { font-size: 0.85rem; font-weight: 400; color: var(--text-dim); line-height: 1.4; }
        .main-feature h1 { font-family: 'Playfair Display', serif; font-size: 2.3rem; font-weight: 700; line-height: 1.1; margin-bottom: 20px; cursor: pointer; }
        .main-feature-img { width: 100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; cursor: pointer; }
        .intel-tag { color: var(--blue-intel); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; justify-content: center; }
        .right-card { cursor: pointer; background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }

        /* AUTH MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: #020608; max-width: 420px; width: 90%; border-radius: 30px; padding: 40px; border: 1px solid var(--border); position: relative; text-align: center; }
        .auth-tabs-row { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: 800; opacity: 0.4; }
        .auth-tab.active { opacity: 1; color: var(--cyan); border-bottom: 3px solid var(--cyan); }
        .auth-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; margin: 10px 0; border-radius: 12px; color: #fff; outline: none; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--cyan); }

        .widget-area { background: #000; min-height: 800px; border-radius: 20px; border: 1px solid var(--border); padding: 10px; overflow: hidden; }
        #myBoard { width: 450px; max-width: 100%; margin: 0 auto; border: 6px solid #222; border-radius: 8px; }
        footer { padding: 40px 5%; text-align: center; opacity: 0.3; border-top: 1px solid var(--border); font-size: 0.7rem;}
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="switchPage('home')">
            <img src="https://github.com/MCrashOut/Moroccansportsnews/blob/main/favicon.png/icon.png?raw=true" alt="H">
            Moroccan<span>SportsHub</span>
        </div>
        <nav>
            <ul>
                <li><a onclick="switchPage('home')" id="nav-home" class="active">Home</a></li>
                <li><a onclick="switchPage('feed')" id="nav-feed">Feed</a></li>
                <li><a onclick="switchPage('morocco')" id="nav-morocco">Moroccan</a></li>
                <li><a onclick="switchPage('global')" id="nav-global">Global</a></li>
                <li><a onclick="switchPage('esports')" id="nav-esports">Esports</a></li>
                <li><a onclick="switchPage('chess')" id="nav-chess">Chess</a></li>
                <li><a onclick="switchPage('matches')" id="nav-matches">Matches</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div id="auth-ui"><button class="auth-btn" onclick="openAuth()">Access Hub</button></div>
            <i class="fa-solid fa-magnifying-glass search-trigger" onclick="toggleSearch()" style="color:var(--cyan); cursor:pointer; font-size:1.1rem; margin-left:10px;"></i>
        </div>
    </header>

    <div id="search-overlay" style="position:fixed; top:60px; left:0; width:100%; background:#000; border-bottom:1px solid var(--cyan); padding:15px 5%; z-index:999; display:none; align-items:center; gap:15px;">
        <i class="fa-solid fa-magnifying-glass" style="color:var(--cyan)"></i>
        <input type="text" id="active-search-input" placeholder="Search Neural Intelligence..." onkeyup="handleSearch(event)" style="flex:1; background:transparent; border:none; color:#fff; outline:none;">
        <i class="fa-solid fa-xmark" onclick="toggleSearch()" style="color:var(--red); cursor:pointer"></i>
    </div>

    <div id="content-wrapper">
        <div id="home-page" class="view-page active">
            <div id="search-results-area" style="display:none; padding: 0 5% 40px;"><div class="news-grid" id="search-output-grid"></div></div>
            <div class="newspaper-grid" id="standard-home-layout">
                <div class="side-wire" id="wire-left"></div>
                <div id="center-intel" class="main-feature"></div>
                <div class="intel-files" id="wire-right"></div>
            </div>
        </div>

        <div id="feed-page" class="view-page">
            <div style="padding:20px 5%; max-width:800px; margin:auto;">
                <h2 style="color:var(--cyan); margin-bottom:20px; text-transform:uppercase; letter-spacing:2px;">Community Intelligence Feed</h2>
                <div style="background:var(--glass); border:1px solid var(--border); border-radius:50px; padding:12px 25px; cursor:pointer; display:flex; justify-content:space-between; margin-bottom:30px;" onclick="$('#post-modal').css('display','flex')">
                    <span style="opacity:0.5;">Broadcast your sports intelligence...</span>
                    <i class="fa-solid fa-paper-plane" style="color:var(--cyan)"></i>
                </div>
                <div id="feed-container"></div>
            </div>
        </div>

        <div id="morocco-page" class="view-page"><div class="news-grid" id="feed-morocco" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; padding:20px 5%;"></div></div>
        <div id="global-page" class="view-page"><div class="news-grid" id="feed-global" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; padding:20px 5%;"></div></div>
        <div id="esports-page" class="view-page"><div class="news-grid" id="feed-esports" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; padding:20px 5%;"></div></div>

        <div id="chess-page" class="view-page">
            <h2 style="padding:0 5%; margin-bottom:20px; border-left:5px solid var(--cyan); margin-left:5%;">Grandmaster Intelligence</h2>
            <div class="news-grid" id="feed-chess"></div>
            <div class="board-container">
                <h2 style="margin-bottom:20px; color:var(--cyan);">Elite Neural AI</h2>
                <div id="myBoard"></div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                    <button class="auth-btn" onclick="initChess('white')">Play White</button>
                    <button class="auth-btn" onclick="initChess('black')">Play Black</button>
                </div>
            </div>
        </div>

        <div id="matches-page" class="view-page"><div class="widget-area" id="live-inject"></div></div>

        <div id="profile-page" class="view-page">
            <div class="profile-dashboard" style="background:var(--glass); border:1px solid var(--border); padding:40px; border-radius:30px; text-align:center; max-width:500px; margin: 40px auto;">
                <h2 style="color:var(--cyan); margin-bottom:25px;">Agent Identity Sync</h2>
                <input type="text" id="set-name" class="auth-input" placeholder="Update Agent ID">
                <input type="email" id="set-email" class="auth-input" placeholder="Change Email">
                <input type="password" id="set-pass" class="auth-input" placeholder="New Password">
                <button class="auth-btn" style="width:100%; margin-top:15px; padding:15px;" onclick="updateProfileData()">Sync Database</button>
                <button class="auth-btn" style="width:100%; margin-top:10px; background:var(--red); color:#fff; padding:15px;" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="modal">
        <div class="modal-content" style="max-width:600px;">
            <span class="close" onclick="$('#post-modal').hide()">&times;</span>
            <h2 style="color:var(--cyan); margin-bottom:20px;">Broadcast news</h2>
            <textarea id="post-content" placeholder="Share sports intel..." style="width:100%; height:150px; padding:15px; border-radius:15px; background:#000; border:1px solid var(--border); color:#fff; outline:none; resize:none;"></textarea>
            <button class="auth-btn" style="width:100%; margin-top:20px; padding:15px;" onclick="createPost()">Broadcast Post</button>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="$('#auth-modal').hide()">&times;</span>
            <div class="auth-tabs-row">
                <div id="tab-login" class="auth-tab active" onclick="setAuthMode('login')">LOGIN</div>
                <div id="tab-signup" class="auth-tab" onclick="setAuthMode('signup')">SIGN UP</div>
            </div>
            <div id="signup-fields" style="display:none;"><input type="text" id="username" placeholder="Agent ID" class="auth-input"></div>
            <input type="email" id="email" placeholder="Agent Email" class="auth-input">
            <input type="password" id="pass" placeholder="Security Key" class="auth-input">
            <button class="auth-btn" id="auth-submit-btn" style="width:100%; margin-top:20px; padding:15px;" onclick="handleAuth()">Enter Hub</button>
            <button class="auth-btn" style="width:100%; margin-top:10px; background:white; color:black; padding:15px;" onclick="loginGoogle()">Google Access</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="$('.modal').hide()">&times;</span>
            <h2 id="m-title" style="color:var(--cyan); margin-bottom:15px;"></h2>
            <p id="m-body" style="color:var(--text-dim); line-height:1.6; text-align:left;"></p>
            <div class="reaction-bar" id="reaction-ui">
                <button class="react-btn" onclick="submitReact('like')">👍<span class="react-count" id="c-like">0</span></button>
                <button class="react-btn" onclick="submitReact('heart')">❤️<span class="react-count" id="c-heart">0</span></button>
                <button class="react-btn" onclick="submitReact('fire')">🔥<span class="react-count" id="c-fire">0</span></button>
                <button class="react-btn" onclick="submitReact('dislike')">👎<span class="react-count" id="c-dislike">0</span></button>
            </div>
            <a id="m-link" href="#" target="_blank" class="auth-btn" style="display:block; text-align:center; margin-top:20px;">Read Full Intel</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDl3HcQUr7Nd0oJOpsSmx77mTi7U4PyR0w",
            authDomain: "moroccansportshub.firebaseapp.com",
            projectId: "moroccansportshub",
            storageBucket: "moroccansportshub.firebasestorage.app",
            messagingSenderId: "1081971044275",
            appId: "1:1081971044275:web:3f04c81f88ee26a9d365c6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let masterPool = [], authMode = 'login', game = new Chess(), board = null, feedListener = null;

        function switchPage(p) {
            $('.view-page').removeClass('active');
            $('#'+p+'-page').addClass('active');
            $('nav a').removeClass('active');
            $('#nav-'+p).addClass('active');
            
            if(p === 'feed') loadFeed();
            else if(feedListener) { feedListener(); feedListener = null; }

            if(p === 'matches') {
                const box = $('#live-inject').empty();
                setTimeout(() => {
                    box.append('<api-sports-widget data-type="games" data-sport="football" data-theme="dark" data-key="77aa814e7955b3042a9ebf24fc1bee18"></api-sports-widget>');
                    $.getScript('https://widgets.api-sports.io/3.1.0/widgets.js?t=' + Date.now());
                }, 150);
            }
            window.scrollTo(0,0);
        }

        // --- FEED & PIN ---
        async function createPost() {
            if(!auth.currentUser) return alert("Agent Hub login required.");
            const content = $('#post-content').val().trim();
            if(!content) return;
            try {
                await db.collection('posts').add({
                    userId: auth.currentUser.uid,
                    username: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                    content: content, score: 0, likes: 0, dislikes: 0, fires: 0, hearts: 0, pinned: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                $('#post-content').val(''); $('#post-modal').hide();
            } catch(e) { alert(e.message); }
        }

        function loadFeed() {
            if(feedListener) feedListener();
            feedListener = db.collection('posts').orderBy('pinned', 'desc').orderBy('score', 'desc').onSnapshot(snapshot => {
                const container = $('#feed-container').empty();
                snapshot.forEach(async doc => {
                    const post = doc.data(), pid = doc.id;
                    const isAdmin = auth.currentUser && auth.currentUser.email === "rabiimodz@gmail.com";
                    const isOwner = auth.currentUser && (post.userId === auth.currentUser.uid || isAdmin);
                    let active = {};
                    if(auth.currentUser) {
                        const r = await db.collection('reactions_feed').doc(`${pid}_${auth.currentUser.uid}`).get();
                        if(r.exists) active[r.data().type] = true;
                    }
                    container.append(`
                        <div class="post-card ${post.pinned?'pinned':''}">
                            ${isOwner ? `<i class="fa-solid fa-thumbtack pin-btn ${post.pinned?'active':''}" onclick="togglePin('${pid}', ${post.pinned})"></i>` : ''}
                            ${isOwner ? `<i class="fa-solid fa-trash delete-btn" onclick="deletePost('${pid}')"></i>` : ''}
                            <span class="post-user">@${post.username} ${post.pinned?'📌 pinned':''}</span>
                            <p style="color:#fff; line-height:1.6; margin-bottom:15px;">${post.content}</p>
                            <div style="display:flex; gap:15px; border-top:1px solid var(--border); padding-top:10px;">
                                <button class="feed-react-btn ${active.like?'active':''}" onclick="reactToFeedPost('${pid}', 'like')">👍 ${post.likes||0}</button>
                                <button class="feed-react-btn ${active.heart?'active':''}" onclick="reactToFeedPost('${pid}', 'heart')">❤️ ${post.hearts||0}</button>
                                <button class="feed-react-btn ${active.fire?'active':''}" onclick="reactToFeedPost('${pid}', 'fire')">🔥 ${post.fires||0}</button>
                                <button class="feed-react-btn ${active.dislike?'active':''}" onclick="reactToFeedPost('${pid}', 'dislike')">👎 ${post.dislikes||0}</button>
                            </div>
                        </div>
                    `);
                });
            });
        }
        async function togglePin(id, s) { await db.collection('posts').doc(id).update({ pinned: !s }); }
        async function deletePost(id) { if(confirm("Terminate broadcast?")) await db.collection('posts').doc(id).delete(); }

        async function reactToFeedPost(postId, type) {
            if(!auth.currentUser) return alert("Login required.");
            const uid = auth.currentUser.uid;
            const rid = `${postId}_${uid}`, rref = db.collection('reactions_feed').doc(rid), pref = db.collection('posts').doc(postId);
            const weights = { like: 1, dislike: -1, fire: 2, heart: 2 };

            await db.runTransaction(async t => {
                const rd = await t.get(rref), pd = await t.get(pref);
                if(!pd.exists) return;
                let post = pd.data(), sc = 0, up = {};
                if(rd.exists) {
                    const old = rd.data().type;
                    if(old === type) { sc -= weights[old]; up[old+'s'] = (post[old+'s']||1)-1; t.delete(rref); }
                    else {
                        // Logic-gate: Toggle between Negative/Positive
                        const isPos = (t) => t !== 'dislike';
                        if(isPos(old) !== isPos(type)) { sc = sc - weights[old] + weights[type]; up[old+'s'] = (post[old+'s']||1)-1; up[type+'s'] = (post[type+'s']||0)+1; t.update(rref, {type}); }
                        else { sc = sc - weights[old] + weights[type]; up[old+'s'] = (post[old+'s']||1)-1; up[type+'s'] = (post[type+'s']||0)+1; t.update(rref, {type}); }
                    }
                } else { sc += weights[type]; t.set(rref, {type, userId: uid, postId}); up[type+'s'] = (post[type+'s']||0)+1; }
                up.score = (post.score||0) + sc; t.update(pref, up);
            });
        }

        // --- AUTH ---
        function openAuth() { $('#auth-modal').css('display','flex'); }
        function setAuthMode(m) { authMode = m; $('.auth-tab').removeClass('active'); $('#tab-'+m).addClass('active'); $('#signup-fields').toggle(m === 'signup'); $('#auth-submit-btn').text(m==='login'?'Enter Hub':'Initialize Agent Account'); }
        async function handleAuth() {
            const e=$('#email').val(), p=$('#pass').val(), u=$('#username').val();
            try { if(authMode==='signup'){ const res=await auth.createUserWithEmailAndPassword(e,p); await res.user.updateProfile({displayName:u}); } else await auth.signInWithEmailAndPassword(e,p); location.reload(); } catch(err){alert(err.message);}
        }
        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => location.reload()); }
        function logout() { auth.signOut().then(() => location.reload()); }
        async function updateProfileData() { try { if($('#set-name').val()) await auth.currentUser.updateProfile({displayName:$('#set-name').val()}); if($('#set-email').val()) await auth.currentUser.updateEmail($('#set-email').val()); if($('#set-pass').val()) await auth.currentUser.updatePassword($('#set-pass').val()); alert("Synced."); } catch(e){alert(e.message);} }

        // --- NEWS ---
        async function initNews() {
            const feeds = { morocco: "https://sport.le360.ma/rss.xml", global: "https://feeds.bbci.co.uk/sport/football/rss.xml", esports: "https://www.talkesport.com/feed/", chess: "https://www.chess.com/rss/news" };
            for(let [tag, url] of Object.entries(feeds)) {
                try {
                    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url) + "&t=" + Date.now());
                    const data = await res.json();
                    let html = "";
                    data.items.forEach(item => {
                        const n = { id: masterPool.length, title: item.title, desc: item.description.replace(/<[^>]*>?/gm, ''), img: item.thumbnail || 'https://via.placeholder.com/400x200', link: item.link, tag: tag.toUpperCase() };
                        if(!masterPool.some(x => x.title === n.title)) { masterPool.push(n); html += `<div class="right-card" onclick="openDetails(${n.id})"><span class="intel-tag">${tag.toUpperCase()}</span><h3>${n.title}</h3></div>`; }
                    });
                    $(`#feed-${tag}`).html(html);
                } catch(e) {}
            }
            renderNewspaper();
        }

        function renderNewspaper() {
            const pool = [...masterPool].sort(() => 0.5 - Math.random()); if(pool.length < 5) return;
            $('#center-intel').html(`<span class="intel-tag">MASTER INTEL</span><h1 onclick="openDetails(${pool[0].id})">${pool[0].title}</h1><img src="${pool[0].img}" class="main-feature-img" onclick="openDetails(${pool[0].id})">`);
            $('#wire-left').html(pool.slice(1,11).map(n => `<div class="wire-item" onclick="openDetails(${n.id})"><h4>${n.title}</h4></div>`));
            $('#wire-right').html(pool.slice(11,18).map(n => `<div class="right-card" onclick="openDetails(${n.id})"><span class="intel-tag">${n.tag}</span><h3>${n.title}</h3></div>`));
        }

        // --- UTILS ---
        function toggleSearch() { $('#search-overlay').toggle(); if($('#search-overlay').is(':visible')) $('#active-search-input').focus(); }
        function handleSearch(e) {
            const q = e.target.value.toLowerCase();
            if(q.length > 1) { switchPage('home'); $('#search-results-area').show(); $('#standard-home-layout').hide(); $('#search-output-grid').html(masterPool.filter(n => n.title.toLowerCase().includes(q)).map(n => `<div class="right-card" onclick="openDetails(${n.id})"><h3>${n.title}</h3></div>`)); }
            else { $('#search-results-area').hide(); $('#standard-home-layout').show(); }
        }
        function openDetails(id) { const n = masterPool[id]; $('#m-title').text(n.title); $('#m-body').text(n.desc); $('#m-link').off('click').on('click', function(e){ e.preventDefault(); window.open(n.link, '_blank'); }); syncReacts(n.title); $('#modal').css('display','flex'); }
        async function syncReacts(title) { const doc = await db.collection('reactions').doc(btoa(title).substring(0,30)).get(); const data = doc.exists ? doc.data() : {like:0, heart:0, fire:0, dislike:0}; ['like','heart','fire','dislike'].forEach(t => { $(`#c-${t}`).text(data[t] || 0); }); }
        async function submitReact(type) { if(!auth.currentUser) return alert("Login Required."); const title = document.getElementById('m-title').innerText; const ref = db.collection('reactions').doc(btoa(title).substring(0,30)); const uid = auth.currentUser.uid; await db.runTransaction(async (t) => { const doc = await t.get(ref); const data = doc.exists ? doc.data() : {like:0, heart:0, fire:0, dislike:0, voters:{}}; if(!data.voters[uid]) data.voters[uid] = {}; if(data.voters[uid][type]) { data[type]--; data.voters[uid][type] = false; } else { data[type]++; data.voters[uid][type] = true; } t.set(ref, data); }); syncReacts(title); }
        
        function initChess(side) {
            game.reset(); board = Chessboard('myBoard', { draggable: true, position: 'start', orientation: side,
                onDragStart: (src, p) => { if (game.game_over() || game.turn() !== side[0] || p.search(new RegExp('^' + side[0])) === -1) return false; },
                onDrop: (src, tar) => { let move = game.move({ from: src, to: tar, promotion: 'q' }); if (move === null) return 'snapback'; window.setTimeout(() => { let moves = game.moves(); if(moves.length > 0) game.move(moves[Math.floor(Math.random() * moves.length)]); board.position(game.fen()); }, 500); },
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
        }
        
        auth.onAuthStateChanged(u => { if(u) { $('#auth-ui').html(`<button class="auth-btn" onclick="switchPage('profile')">Agent Hub</button>`); $('#set-name').val(u.displayName); $('#set-email').val(u.email); } initNews(); });
    </script>
</body>
</html>
