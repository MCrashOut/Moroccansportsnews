<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoroccanSportsHub | Elite Intelligence</title>

    <!-- FONTS & ICONS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <!-- LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #000000;
            --cyan: #00f2fe;
            --red: #c1272d;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* --- DESKTOP HEADER (PC) --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.3rem; font-weight: 800; cursor: pointer; letter-spacing: -1px; }
        .logo span { color: var(--cyan); }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        nav a:hover, nav a.active { opacity: 1; color: var(--cyan); }

        /* --- MOBILE BOTTOM NAV --- */
        .mobile-nav {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #000; border-top: 1px solid var(--border);
            display: none; justify-content: space-around; align-items: center;
            z-index: 2000; padding-bottom: env(safe-area-inset-bottom);
        }
        .mobile-nav button { background: none; border: none; color: #555; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .mobile-nav button.active { color: var(--cyan); transform: scale(1.1); }

        /* --- PAGE CONTENT --- */
        .page { display: none; padding: 100px 5% 100px; max-width: 1200px; margin: auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NEWS CARDS --- */
        .news-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 25px; transition: 0.3s; }
        .news-card:hover { border-color: var(--cyan); }
        .news-img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .news-body { padding: 20px; }
        .news-body h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 10px; }
        .news-link { color: var(--cyan); text-decoration: none; font-weight: 800; font-size: 0.8rem; }

        /* --- FEED POSTS --- */
        .post-card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .post-user { color: var(--cyan); font-weight: 800; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .react-btn { background: transparent; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
        .react-btn.active { color: var(--cyan); font-weight: 800; }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px; }
        .modal-content { background: #020608; max-width: 400px; width: 100%; border-radius: 30px; padding: 40px; border: 1px solid var(--border); text-align: center; position: relative; }
        .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; font-weight: 800; opacity: 0.4; }
        .auth-tab.active { opacity: 1; color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .input-field { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; border-radius: 12px; color: #fff; outline: none; }
        
        .btn-main { background: var(--cyan); color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .create-btn { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); border: none; font-size: 1.5rem; font-weight: 800; cursor: pointer; z-index: 1500; box-shadow: 0 5px 20px rgba(0,242,254,0.3); }

        /* --- CHESS --- */
        #myBoard { width: 100% !important; max-width: 450px; border: 5px solid #222; border-radius: 10px; margin: 0 auto; }

        /* --- RESPONSIVE LOGIC --- */
        @media (max-width: 1024px) {
            header nav { display: none; } /* Hide PC Menu */
            .mobile-nav { display: flex; } /* Show Mobile Nav */
            .page { padding: 80px 15px 100px; }
            .news-img { height: 180px; }
            .news-body h3 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="go('home')">Moroccan<span>SportsHub</span></div>
        <nav>
            <ul>
                <li><a onclick="go('home')" id="nav-pc-home" class="active">Home</a></li>
                <li><a onclick="go('feed')" id="nav-pc-feed">Feed</a></li>
                <li><a onclick="go('chess')" id="nav-pc-chess">Chess</a></li>
                <li><a onclick="go('profile')" id="nav-pc-profile">Profile</a></li>
            </ul>
        </nav>
        <div id="auth-ui-header">
            <button class="btn-main" onclick="openAuth()">Access Hub</button>
        </div>
    </header>

    <div id="content-wrapper">
        <!-- HOME PAGE -->
        <div id="home" class="page active">
            <h2 style="margin-bottom:20px; color:var(--cyan); border-left:4px solid var(--cyan); padding-left:15px;">TOP INTELLIGENCE</h2>
            <div id="news-container"></div>
        </div>

        <!-- FEED PAGE -->
        <div id="feed" class="page">
            <h2 style="margin-bottom:20px; color:var(--cyan);">Community Feed</h2>
            <div id="posts-container"></div>
        </div>

        <!-- CHESS PAGE -->
        <div id="chess" class="page">
            <div class="board-container" style="text-align:center;">
                <h2 style="margin-bottom:20px; color:var(--cyan);">Elite Neural AI</h2>
                <div id="myBoard"></div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                    <button class="btn-main" onclick="startChess('white')">White</button>
                    <button class="btn-main" onclick="startChess('black')">Black</button>
                </div>
                <p id="game-status" style="margin-top:15px; opacity:0.5;">Select side...</p>
            </div>
        </div>

        <!-- PROFILE PAGE (SETTINGS) -->
        <div id="profile" class="page">
            <div class="profile-dashboard" style="max-width:500px; margin:auto; background:var(--glass); border:1px solid var(--border); padding:40px; border-radius:30px; text-align:center;">
                <h2 id="p-name" style="color:var(--cyan); margin-bottom:5px;">Agent Name</h2>
                <p id="p-email" style="opacity:0.4; margin-bottom:30px; font-size:0.8rem;"></p>
                
                <div style="text-align:left;">
                    <label style="font-size:0.6rem; opacity:0.5;">UPDATE AGENT ID</label>
                    <input type="text" id="up-name" class="input-field" placeholder="Username">
                    <label style="font-size:0.6rem; opacity:0.5;">CHANGE SECURITY KEY</label>
                    <input type="password" id="up-pass" class="input-field" placeholder="New Password">
                    <button class="btn-main" style="width:100%; margin-top:15px;" onclick="updateAgent()">Sync Database</button>
                    <button class="btn-main" style="width:100%; margin-top:10px; background:#222; color:#fff;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <div class="mobile-nav">
        <button onclick="go('home')" id="n-home" class="active"><i class="fa-solid fa-house"></i></button>
        <button onclick="go('feed')" id="n-feed"><i class="fa-solid fa-rss"></i></button>
        <button onclick="go('chess')" id="n-chess"><i class="fa-solid fa-chess-knight"></i></button>
        <button onclick="go('profile')" id="n-profile"><i class="fa-solid fa-user-shield"></i></button>
    </div>

    <button class="create-btn" onclick="openPostModal()">+</button>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:15px; right:20px; cursor:pointer;" onclick="$('#auth-modal').hide()">✕</span>
            <div class="auth-tabs">
                <div id="t-login" class="auth-tab active" onclick="setAuthMode('login')">LOGIN</div>
                <div id="tab-signup" class="auth-tab" onclick="setAuthMode('signup')">SIGN UP</div>
            </div>
            <div id="signup-name" style="display:none;"><input type="text" id="auth-username" class="input-field" placeholder="Agent ID"></div>
            <input type="email" id="auth-email" class="input-field" placeholder="Email Address">
            <input type="password" id="auth-pass" class="input-field" placeholder="Password">
            <button class="btn-main" style="width:100%; padding:15px; margin-top:10px;" onclick="handleAuth()">Enter Hub</button>
            <button class="btn-main" style="width:100%; margin-top:10px; background:#fff; color:#000;" onclick="loginGoogle()">Google Login</button>
        </div>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <h3>Broadcast Intel</h3>
            <textarea id="post-text" class="input-field" style="height:120px; margin-top:15px;" placeholder="What is the latest news?"></textarea>
            <button class="btn-main" style="width:100%;" onclick="submitPost()">Broadcast</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDl3HcQUr7Nd0oJOpsSmx77mTi7U4PyR0w",
            authDomain: "moroccansportshub.firebaseapp.com",
            projectId: "moroccansportshub"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let authMode = 'login', game = new Chess(), board = null;

        // --- NAVIGATION LOGIC ---
        function go(p) {
            // PROFILE PROTECTION LOGIC
            if(p === 'profile' && !auth.currentUser) {
                openAuth();
                return;
            }

            $('.page').removeClass('active');
            $('#' + p).addClass('active');
            
            // Sync Active States
            $('.mobile-nav button, nav a').removeClass('active');
            $(`#n-${p}, #nav-pc-${p}`).addClass('active');

            if(p === 'home') loadNews();
            if(p === 'feed') loadFeed();
            window.scrollTo(0,0);
        }

        // --- AUTH ---
        function openAuth() { $('#auth-modal').css('display','flex'); }
        function setAuthMode(m) { 
            authMode = m; 
            $('.auth-tab').removeClass('active'); 
            (m === 'login' ? $('#t-login') : $('#tab-signup')).addClass('active');
            $('#signup-name').toggle(m === 'signup');
        }
        async function handleAuth() {
            const e = $('#auth-email').val(), p = $('#auth-pass').val(), u = $('#auth-username').val();
            try {
                if(authMode === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await res.user.updateProfile({displayName: u});
                } else await auth.signInWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) { alert(err.message); }
        }
        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => location.reload()); }
        function logout() { auth.signOut().then(() => location.reload()); }

        // --- NEWS ---
        async function loadNews() {
            const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/sport/football/rss.xml");
            const data = await res.json();
            let html = "";
            data.items.slice(0, 10).forEach(n => {
                html += `
                <div class="news-card">
                    <img src="${n.thumbnail || 'https://via.placeholder.com/600x300?text=SportsHub'}" class="news-img">
                    <div class="news-body">
                        <span class="intel-tag">Global Intelligence</span>
                        <h3>${n.title}</h3>
                        <a href="${n.link}" target="_blank" class="news-link">Full Article →</a>
                    </div>
                </div>`;
            });
            $('#news-container').html(html);
        }

        // --- FEED ---
        function openPostModal() { if(!auth.currentUser) return openAuth(); $('#post-modal').css('display','flex'); }
        async function submitPost() {
            const txt = $('#post-text').val().trim(); if(!txt) return;
            await db.collection('posts').add({
                content: txt, userId: auth.currentUser.uid, username: auth.currentUser.displayName || auth.currentUser.email,
                score: 0, likes: 0, hearts: 0, fires: 0, dislikes: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            $('#post-text').val(''); $('#post-modal').hide();
        }
        function loadFeed() {
            db.collection('posts').orderBy('score', 'desc').onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    html += `
                    <div class="post-card">
                        <span class="post-user">@${p.username}</span>
                        <p>${p.content}</p>
                        <div style="display:flex; gap:15px; margin-top:15px;">
                            <button class="react-btn" onclick="react('${doc.id}', 'like')">👍 ${p.likes||0}</button>
                            <button class="react-btn" onclick="react('${doc.id}', 'heart')">❤️ ${p.hearts||0}</button>
                        </div>
                    </div>`;
                });
                $('#posts-container').html(html);
            });
        }

        // --- CHESS ---
        function startChess(side) {
            let color = side === 'white' ? 'w' : 'b';
            game.reset();
            board = Chessboard('myBoard', {
                draggable: true, position: 'start', orientation: side,
                onDragStart: (src, p) => { if (game.game_over() || game.turn() !== color || p.search(new RegExp('^' + color)) === -1) return false; },
                onDrop: (s, t) => {
                    let move = game.move({ from: s, to: t, promotion: 'q' });
                    if (!move) return 'snapback';
                    window.setTimeout(makeAiMove, 500);
                },
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            if(color === 'b') window.setTimeout(makeAiMove, 800);
        }
        function makeAiMove() {
            let moves = game.moves(); if(!moves.length) return;
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                $('#auth-ui-header').html(`<button class="btn-main" onclick="go('profile')">Agent Hub</button>`);
                $('#p-name').text(u.displayName || "Agent");
                $('#p-email').text(u.email);
            }
            loadNews();
        });
    </script>
</body>
</html>
