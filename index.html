<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoroccanSportsHub | Elite Intelligence 2026</title>

    <link rel="icon" type="image/png" href="https://github.com/MCrashOut/Moroccansportsnews/blob/main/favicon.png/icon.png?raw=true">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <!-- CORE LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #000000;
            --grad: linear-gradient(180deg, #000000 0%, #080f12 100%);
            --cyan: #00f2fe;
            --blue-intel: #3b5998;
            --red: #c1272d;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); background-image: var(--grad); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px);
            padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; letter-spacing: -1px; }
        .logo img { width: 28px; height: 28px; border-radius: 4px; margin-right: 8px; border: 1px solid var(--cyan); }
        .logo span { color: var(--cyan); }
        
        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }
        nav a { color: var(--text); text-decoration: none; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; cursor: pointer;}
        nav a:hover, nav a.active { opacity: 1; color: var(--cyan); }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .search-trigger { color: var(--cyan); cursor: pointer; font-size: 1.1rem; }
        .auth-btn { background: var(--cyan); color: #000; padding: 8px 22px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; transition: 0.3s; }

        #search-overlay { 
            position: fixed; top: 60px; left: 0; width: 100%; background: #000; 
            border-bottom: 1px solid var(--cyan); padding: 15px 5%; z-index: 999;
            display: none; align-items: center; gap: 15px;
        }
        #search-overlay input { flex: 1; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; }

        .view-page { display: none; padding-top: 85px; animation: fadeIn 0.4s ease; min-height: 100vh; padding-bottom: 60px; }
        .view-page.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HOME GRID */
        .newspaper-grid { display: grid; grid-template-columns: 280px 1fr 320px; gap: 40px; padding: 20px 5%; }
        @media (max-width: 1100px) { .newspaper-grid { grid-template-columns: 1fr; } }
        .side-wire { border-right: 1px solid var(--border); padding-right: 25px; }
        .wire-item { cursor: pointer; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; transition: 0.3s; }
        .wire-item:hover h4 { color: var(--cyan); }
        .wire-item h4 { font-size: 0.85rem; font-weight: 400; color: var(--text-dim); line-height: 1.4; }
        .main-feature h1 { font-family: 'Playfair Display', serif; font-size: 2.3rem; font-weight: 700; line-height: 1.1; margin-bottom: 20px; color: #fff; cursor: pointer; }
        .main-feature-img { width: 100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; cursor: pointer; object-fit: cover; }
        .intel-tag { color: var(--blue-intel); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }

        .right-card { cursor: pointer; background: var(--glass); padding: 18px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; transition: 0.3s; height: auto; }
        .right-card:hover { border-color: var(--cyan); transform: translateY(-3px); }
        .right-card h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; font-weight: 700; line-height: 1.2; }

        /* REACTION BAR */
        .reaction-bar { display: flex; gap: 20px; padding: 15px; border-top: 1px solid var(--border); justify-content: center; margin-top: 20px;}
        .react-btn { background: transparent !important; border: none !important; outline: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; padding: 5px; }
        .react-btn:hover { transform: scale(1.2); }
        .react-count { font-size: 0.8rem; font-weight: 800; color: var(--cyan); }

        /* CHESS */
        .board-container { background: var(--glass); border: 1px solid var(--border); padding: 30px; border-radius: 30px; text-align: center; max-width: 600px; margin: 0 auto; }
        #myBoard { width: 450px; max-width: 100%; margin: 0 auto; border: 6px solid #222; border-radius: 8px; }

        /* AUTH MODAL CENTRAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-content { background: #020608; max-width: 420px; width: 90%; border-radius: 30px; padding: 40px; border: 1px solid var(--border); position: relative; text-align: center; }
        .auth-tabs-row { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .auth-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 800; font-size: 0.8rem; opacity: 0.4; transition: 0.3s; }
        .auth-tab.active { opacity: 1; color: var(--cyan); border-bottom: 3px solid var(--cyan); }
        .auth-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; margin: 10px 0; border-radius: 12px; color: #fff; outline: none; text-align: left;}

        .widget-area { background: #000; min-height: 850px; border-radius: 20px; border: 1px solid var(--border); padding: 10px; overflow: hidden; position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--cyan); }
        footer { padding: 40px 5%; text-align: center; opacity: 0.3; border-top: 1px solid var(--border); font-size: 0.7rem;}
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="switchPage('home')">
            <img src="https://github.com/MCrashOut/Moroccansportsnews/blob/main/favicon.png/icon.png?raw=true" alt="H">
            Moroccan<span>SportsHub</span>
        </div>
        <nav>
            <ul>
                <li><a onclick="switchPage('home')" id="nav-home" class="active">Home</a></li>
                <li><a onclick="switchPage('morocco')" id="nav-morocco">Moroccan</a></li>
                <li><a onclick="switchPage('global')" id="nav-global">Global</a></li>
                <li><a onclick="switchPage('esports')" id="nav-esports">Esports</a></li>
                <li><a onclick="switchPage('chess')" id="nav-chess">Chess</a></li>
                <li><a onclick="switchPage('matches')" id="nav-matches">Matches</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <i class="fa-solid fa-magnifying-glass search-trigger" onclick="toggleSearch()"></i>
            <div id="auth-ui"><button class="auth-btn" onclick="openAuth()">Access Hub</button></div>
        </div>
    </header>

    <div id="search-overlay">
        <i class="fa-solid fa-magnifying-glass" style="color:var(--cyan)"></i>
        <input type="text" id="active-search-input" placeholder="Neural Search Intelligence..." onkeyup="handleSearch(event)">
        <i class="fa-solid fa-xmark" onclick="toggleSearch()" style="color:var(--red); cursor:pointer"></i>
    </div>

    <div id="content-wrapper">
        <div id="home-page" class="view-page active">
            <div id="search-results-area" style="display:none; padding: 0 5% 40px;"><div class="news-grid" id="search-output-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div></div>
            <div class="newspaper-grid" id="standard-home-layout">
                <div class="side-wire" id="wire-left"></div>
                <div id="center-intel" class="main-feature"></div>
                <div class="intel-files" id="wire-right"></div>
            </div>
        </div>

        <div id="morocco-page" class="view-page"><div class="news-grid" id="feed-morocco"></div></div>
        <div id="global-page" class="view-page"><div class="news-grid" id="feed-global"></div></div>
        <div id="esports-page" class="view-page"><div class="news-grid" id="feed-esports"></div></div>

        <!-- CHESS HUB -->
        <div id="chess-page" class="view-page">
            <h2 style="padding:0 5%; margin-bottom:20px; border-left:5px solid var(--cyan); margin-left:5%;">Grandmaster Intelligence</h2>
            <div class="news-grid" id="feed-chess"></div>
            <div class="board-container">
                <h2 style="margin-bottom:20px; color:var(--cyan);">Elite Neural AI</h2>
                <div id="myBoard"></div>
                <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                    <button class="auth-btn" onclick="initChess('white')">Play White</button>
                    <button class="auth-btn" onclick="initChess('black')">Play Black</button>
                </div>
                <p id="game-status" style="margin-top:15px; color:var(--text-dim); font-weight:800;">Turn: Agent move...</p>
            </div>
        </div>

        <!-- MATCHES WIDGET -->
        <div id="matches-page" class="view-page"><div class="widget-area" id="live-inject"></div></div>

        <!-- PROFILE Dashboard -->
        <div id="profile-page" class="view-page">
            <div class="profile-container" style="max-width:500px; margin:0 auto;">
                <div class="settings-card">
                    <h2 style="color:var(--cyan); margin-bottom:25px;">Agent Identity Sync</h2>
                    <input type="text" id="set-name" class="auth-input" placeholder="Update Agent ID">
                    <input type="email" id="set-email" class="auth-input" placeholder="Change Email">
                    <input type="password" id="set-pass" class="auth-input" placeholder="New Password">
                    <button class="auth-btn" style="width:100%; margin-top:15px; padding:15px;" onclick="updateProfileData()">Sync Database</button>
                    <button class="auth-btn" style="width:100%; margin-top:10px; background:var(--red); color:#fff; padding:15px;" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="$('#auth-modal').hide()">&times;</span>
            <div class="auth-tabs-row">
                <div id="tab-login" class="auth-tab active" onclick="setAuthMode('login')">LOGIN</div>
                <div id="tab-signup" class="auth-tab" onclick="setAuthMode('signup')">SIGN UP</div>
            </div>
            <input type="email" id="email" placeholder="Agent Email" class="auth-input">
            <input type="password" id="pass" placeholder="Security Key" class="auth-input">
            <button class="auth-btn" style="width:100%; margin-top:20px;" onclick="handleAuth()">Enter Hub</button>
            <button class="auth-btn" style="width:100%; margin-top:10px; background:#fff; color:#000; padding:15px;" onclick="loginGoogle()">
                <i class="fa-brands fa-google" style="margin-right:8px"></i> Google Login
            </button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="$('.modal').hide()">&times;</span>
            <h2 id="m-title" style="color:var(--cyan); margin-bottom:15px;"></h2>
            <p id="m-body" style="color:var(--text-dim); line-height:1.6; text-align:left;"></p>
            <div class="reaction-bar" id="reaction-ui">
                <button class="react-btn" onclick="submitReact('like')">👍<span class="react-count" id="c-like">0</span></button>
                <button class="react-btn" onclick="submitReact('heart')">❤️<span class="react-count" id="c-heart">0</span></button>
                <button class="react-btn" onclick="submitReact('fire')">🔥<span class="react-count" id="c-fire">0</span></button>
                <button class="react-btn" onclick="submitReact('dislike')">👎<span class="react-count" id="c-dislike">0</span></button>
            </div>
            <a id="m-link" href="#" target="_blank" class="auth-btn" style="display:block; text-align:center; margin-top:20px;">Read Full Intel</a>
        </div>
    </div>

    <div style="position:fixed; bottom:20px; right:20px; z-index:9999;"><div class="elfsight-app-32c8aece-3b03-41a8-90cd-aa80ccfa2a2a" data-elfsight-app-lazy></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDl3HcQUr7Nd0oJOpsSmx77mTi7U4PyR0w",
            authDomain: "moroccansportshub.firebaseapp.com",
            projectId: "moroccansportshub",
            storageBucket: "moroccansportshub.firebasestorage.app",
            messagingSenderId: "1081971044275",
            appId: "1:1081971044275:web:3f04c81f88ee26a9d365c6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let masterPool = [], authMode = 'login', board = null, game = new Chess();

        function switchPage(p) {
            $('.view-page').removeClass('active');
            $('#'+p+'-page').addClass('active');
            $('nav a').removeClass('active');
            $('#nav-'+p).addClass('active');
            
            // DYNAMIC WIDGET RE-INJECTION (FIX FOR MATCHES BUG)
            if(p === 'matches') {
                $('#live-inject').empty().append('<api-sports-widget data-type="games" data-sport="football" data-theme="dark" data-key="77aa814e7955b3042a9ebf24fc1bee18"></api-sports-widget>');
                const script = document.createElement('script');
                script.type = 'module';
                script.src = 'https://widgets.api-sports.io/3.1.0/widgets.js?v=' + Date.now();
                document.head.appendChild(script);
            }
            window.scrollTo(0,0);
        }

        // --- CHESS AI ---
        function initChess(side) {
            game.reset();
            board = Chessboard('myBoard', {
                draggable: true, position: 'start', orientation: side,
                onDragStart: (src, p) => { if (game.game_over() || game.turn() !== side[0] || p.search(new RegExp('^' + side[0])) === -1) return false; },
                onDrop: (src, tar) => {
                    let move = game.move({ from: src, to: tar, promotion: 'q' });
                    if (move === null) return 'snapback';
                    window.setTimeout(makeAiMove, 500);
                },
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            if(side === 'black') window.setTimeout(makeAiMove, 500);
        }
        function makeAiMove() {
            let moves = game.moves(); if(moves.length === 0) return;
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            board.position(game.fen());
        }

        // --- AUTH ---
        function openAuth() { $('#auth-modal').css('display','flex'); }
        function setAuthMode(m) { authMode = m; $('.auth-tab').removeClass('active'); $('#tab-'+m).addClass('active'); }
        async function handleAuth() {
            const e=$('#email').val(), p=$('#pass').val();
            try { if(authMode==='signup') await auth.createUserWithEmailAndPassword(e,p); else await auth.signInWithEmailAndPassword(e,p); location.reload(); } catch(err){alert(err.message);}
        }
        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => location.reload()); }
        function logout() { auth.signOut().then(() => location.reload()); }
        async function updateProfileData() {
            try {
                const u = auth.currentUser;
                if($('#set-name').val()) await u.updateProfile({displayName: $('#set-name').val()});
                if($('#set-pass').val()) await u.updatePassword($('#set-pass').val());
                alert("Agent Profile Updated.");
            } catch(e) { alert(e.message); }
        }

        // --- REACTIONS ---
        async function submitReact(type) {
            if(!auth.currentUser) return alert("Login Required.");
            const title = document.getElementById('m-title').innerText;
            const ref = db.collection('reactions').doc(btoa(title).substring(0,30));
            const uid = auth.currentUser.uid;
            await db.runTransaction(async (t) => {
                const doc = await t.get(ref);
                const data = doc.exists ? doc.data() : {like:0, heart:0, fire:0, dislike:0, voters:{}};
                if(!data.voters[uid]) data.voters[uid] = {};
                if(data.voters[uid][type]) { data[type]--; data.voters[uid][type] = false; }
                else { data[type]++; data.voters[uid][type] = true; }
                t.set(ref, data);
            });
            syncReacts(title);
        }
        async function syncReacts(title) {
            const doc = await db.collection('reactions').doc(btoa(title).substring(0,30)).get();
            const data = doc.exists ? doc.data() : {like:0, heart:0, fire:0, dislike:0};
            ['like','heart','fire','dislike'].forEach(t => { $(`#c-${t}`).text(data[t] || 0); });
        }

        // --- SEARCH ---
        function toggleSearch() { $('#search-overlay').toggle(); if($('#search-overlay').is(':visible')) $('#active-search-input').focus(); }
        function handleSearch(e) {
            const q = e.target.value.toLowerCase();
            if(q.length > 1) {
                switchPage('home'); $('#search-results-area').show(); $('#standard-home-layout').hide();
                $('#search-output-grid').html(masterPool.filter(n => n.title.toLowerCase().includes(q)).map(n => `<div class="right-card" onclick="openDetails(${n.id})"><span class="intel-tag">${n.tag}</span><h3>${n.title}</h3></div>`).join(''));
            } else { $('#search-results-area').hide(); $('#standard-home-layout').show(); }
        }

        // --- NEWS ---
        async function initNews() {
            const feeds = { morocco: "https://sport.le360.ma/rss.xml", global: "https://feeds.bbci.co.uk/sport/football/rss.xml", esports: "https://www.talkesport.com/feed/", chess: "https://www.chess.com/rss/news" };
            for(let [tag, url] of Object.entries(feeds)) {
                try {
                    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
                    const data = await res.json();
                    let html = "";
                    data.items.forEach(item => {
                        const n = { id: masterPool.length, title: item.title, desc: item.description.replace(/<[^>]*>?/gm, ''), img: item.thumbnail || item.enclosure?.link, link: item.link, tag: tag.toUpperCase() };
                        if(!masterPool.some(x => x.title === n.title)) {
                            masterPool.push(n);
                            html += `<div class="right-card" onclick="openDetails(${n.id})"><span class="intel-tag" style="color:var(--blue-intel)">${tag.toUpperCase()}</span><h3>${n.title}</h3></div>`;
                        }
                    });
                    $(`#feed-${tag}`).html(html);
                } catch(e) {}
            }
            renderNewspaper();
        }

        function renderNewspaper() {
            const pool = [...masterPool].sort(() => 0.5 - Math.random()); if(pool.length < 5) return;
            $('#center-intel').html(`<span class="intel-tag" style="color:var(--blue-intel)">MASTER INTEL</span><h1 onclick="openDetails(${pool[0].id})">${pool[0].title}</h1><img src="${pool[0].img}" class="main-feature-img" onclick="openDetails(${pool[0].id})"><p style="color:var(--text-dim)">${pool[0].desc.substring(0,250)}...</p>`);
            $('#wire-left').html(pool.slice(1,10).map(n => `<div class="wire-item" onclick="openDetails(${n.id})"><h4>${n.title}</h4></div>`).join(''));
            $('#wire-right').html(pool.slice(11,18).map(n => `<div class="right-card" onclick="openDetails(${n.id})"><span class="intel-tag" style="color:var(--blue-intel)">${n.tag}</span><h3>${n.title}</h3></div>`).join(''));
        }
        function openDetails(id) { 
            const n = masterPool[id]; $('#m-title').text(n.title); $('#m-body').text(n.desc); 
            $('#m-link').off('click').on('click', function(e){ e.preventDefault(); window.open(n.link, '_blank'); });
            syncReacts(n.title); $('#modal').css('display','flex'); 
        }

        auth.onAuthStateChanged((u) => { 
            if(u) { $('#auth-ui').html(`<button class="auth-btn" onclick="switchPage('profile')">Agent Hub</button>`); $('#set-name').val(u.displayName); }
            initNews(); 
        });
    </script>
</body>
</html>
